name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build
        env:
          VITE_BASE_PATH: /openhood/
          VITE_MARKETPLACE_ADDRESS: '0xEc164cCA500E761eaE1e886ee7D347212409f619'
          VITE_DEMO_NFT_ADDRESS: '0x88e3Dd568bF102499B332124B4D78472861641ed'
          VITE_CHAIN_ID: '46630'
          # Free key: https://docs.opensea.io/reference/api-keys — required for live OpenSea in the browser
          VITE_OPENSEA_API_KEY: ${{ secrets.OPENSEA_API_KEY }}
        run: npm run build

      # SPA fallback for client-side routes
      - name: SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
